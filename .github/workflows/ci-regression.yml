name: CI Regression

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sqlite-extension-regression:
    name: sqlite extension regression (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run no-enable_load_extension regression test
        run: |
          pytest -q tests/unit/test_storage.py::test_get_connection_works_without_enable_load_extension --basetemp .pytest-tmp
