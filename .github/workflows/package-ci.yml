name: Package CI

on:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"
      - "README.md"
      - "symdex/**"
      - "scripts/release/**"
      - "tests/smoke_test.py"
      - "tests/unit/test_release_scripts.py"
      - ".github/workflows/package-ci.yml"
      - ".github/workflows/publish.yml"
  pull_request:
    paths:
      - "pyproject.toml"
      - "README.md"
      - "symdex/**"
      - "scripts/release/**"
      - "tests/smoke_test.py"
      - "tests/unit/test_release_scripts.py"
      - ".github/workflows/package-ci.yml"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Validate metadata
        id: meta
        run: python scripts/release/validate_metadata.py --pyproject pyproject.toml --github-output "$GITHUB_OUTPUT"

      - name: Clean previous build artifacts
        run: rm -rf dist build *.egg-info

      - name: Build distributions
        run: python -m build

      - name: Check built distributions
        run: python -m twine check dist/*

      - name: Validate built artifact set
        run: |
          python scripts/release/validate_dist.py \
            --dist dist \
            --package symdex \
            --version "${{ steps.meta.outputs.version }}"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  smoke-pip-wheel:
    name: Smoke test wheel via pip
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Install wheel with pip and run smoke test
        env:
          SYMDEX_EXPECTED_VERSION: ${{ needs.build.outputs.version }}
        run: |
          python -m venv .venv-smoke
          source .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python tests/smoke_test.py

  smoke-uv-wheel:
    name: Smoke test wheel via uv
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Install wheel with uv and run smoke test
        env:
          SYMDEX_EXPECTED_VERSION: ${{ needs.build.outputs.version }}
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py
