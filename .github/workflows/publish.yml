name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: pypi-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Validate metadata and release tag
        id: meta
        run: |
          python scripts/release/validate_metadata.py \
            --pyproject pyproject.toml \
            --tag "${{ github.ref_name }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Guard tracked Markdown
        run: python scripts/release/guard_markdown.py --repo-root .

      - name: Fail if version already exists on PyPI
        run: |
          python - <<'PY'
          import urllib.error
          import urllib.request

          package = "symdex"
          version = "${{ steps.meta.outputs.version }}"
          url = f"https://pypi.org/pypi/{package}/{version}/json"
          try:
              with urllib.request.urlopen(url, timeout=20):
                  raise SystemExit(
                      f"{package} {version} is already published on PyPI; bump pyproject.toml before tagging."
                  )
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print(f"PyPI does not have {package} {version}; release can proceed.")
              else:
                  raise
          PY

      - name: Clean previous build artifacts
        run: rm -rf dist build *.egg-info

      - name: Build distributions
        run: python -m build

      - name: Check built distributions
        run: python -m twine check dist/*

      - name: Validate built artifact set
        run: |
          python scripts/release/validate_dist.py \
            --dist dist \
            --package symdex \
            --version "${{ steps.meta.outputs.version }}"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  smoke-pip-wheel:
    name: Smoke test wheel via pip
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Install wheel with pip and run smoke test
        env:
          SYMDEX_EXPECTED_VERSION: ${{ needs.build.outputs.version }}
        run: |
          python -m venv .venv-smoke
          source .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python tests/smoke_test.py

  smoke-uv-wheel:
    name: Smoke test wheel via uv
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Install wheel with uv and run smoke test
        env:
          SYMDEX_EXPECTED_VERSION: ${{ needs.build.outputs.version }}
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py

  smoke-uv-sdist:
    name: Smoke test sdist via uv
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Install sdist with uv and run smoke test
        env:
          SYMDEX_EXPECTED_VERSION: ${{ needs.build.outputs.version }}
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py

  publish:
    name: Publish to PyPI
    needs:
      - build
      - smoke-pip-wheel
      - smoke-uv-wheel
      - smoke-uv-sdist
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/symdex
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub release
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          generate_release_notes: true
