name: Publish to PyPI

on:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"
      - "symdex/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve next version from PyPI
        id: version
        run: |
          python - << 'PY'
          import json
          import pathlib
          import re
          import urllib.request
          import tomllib

          pyproject = pathlib.Path("pyproject.toml")
          raw = pyproject.read_text(encoding="utf-8")
          current = tomllib.loads(raw)["project"]["version"]
          package = "symdex"
          m = re.match(r"^(\d+)\.(\d+)\.(\d+)$", current)
          if not m:
            raise SystemExit(f"Unsupported version format for auto-release: {current}")
          cur_major, cur_minor, cur_patch = map(int, m.groups())
          next_patch = cur_patch
          try:
            with urllib.request.urlopen(f"https://pypi.org/pypi/{package}/json", timeout=20) as resp:
              data = json.load(resp)
            for v in data.get("releases", {}).keys():
              mm = re.match(r"^(\d+)\.(\d+)\.(\d+)$", v)
              if not mm:
                continue
              maj, min_, patch = map(int, mm.groups())
              if maj == cur_major and min_ == cur_minor:
                next_patch = max(next_patch, patch + 1)
          except Exception:
            pass
          version = f"{cur_major}.{cur_minor}.{next_patch}"
          updated = re.sub(
            r'(?m)^version\s*=\s*"[^"]+"',
            f'version = "{version}"',
            raw,
            count=1,
          )
          pyproject.write_text(updated, encoding="utf-8")

          with open(pathlib.Path(".github_output"), "w", encoding="utf-8") as fh:
            fh.write(f"version={version}\n")
            fh.write(f"tag=v{version}\n")
          PY
          cat .github_output >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: pip install build

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          if git diff --cached --quiet; then
            echo "pyproject.toml already at target version."
          else
            git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }} [skip release]"
            git push origin main
          fi

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create and push tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally."
          else
            git tag "$TAG"
          fi
          git push origin "$TAG" || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
